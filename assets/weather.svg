<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="820" height="328">
  <defs>
    <filter id="sh" x="0%" y="0%" width="114%" height="112%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9" result="blur"/>
      <feOffset in="blur" dx="5" dy="3" result="shifted"/>
      <feFlood flood-color="#000000" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="card">
      <rect x="8" y="8" width="784" height="304" rx="14" ry="14"/>
    </clipPath>
  </defs>
  <rect x="8" y="8" width="784" height="304" rx="14" ry="14" fill="#1a1b2e" filter="url(#sh)"/>
  <rect x="8" y="8" width="140" height="304" fill="#13131f" clip-path="url(#card)"/>
  <line x1="8" y1="74" x2="792" y2="74" stroke="#292e42" stroke-width="1" clip-path="url(#card)"/>
  <line x1="8" y1="142" x2="792" y2="142" stroke="#292e42" stroke-width="1" clip-path="url(#card)"/>
  <line x1="8" y1="194" x2="792" y2="194" stroke="#292e42" stroke-width="1" clip-path="url(#card)"/>
  <line x1="8" y1="246" x2="792" y2="246" stroke="#292e42" stroke-width="1" clip-path="url(#card)"/>
  <line x1="148" y1="8" x2="148" y2="312" stroke="#292e42" stroke-width="1" clip-path="url(#card)"/>
  <line x1="362" y1="8" x2="362" y2="312" stroke="#292e42" stroke-width="1" clip-path="url(#card)"/>
  <line x1="576" y1="8" x2="576" y2="312" stroke="#292e42" stroke-width="1" clip-path="url(#card)"/>
  <text x="78" y="48" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7aa2f7">Date</text>
  <text x="78" y="108" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7aa2f7">Weather</text>
  <text x="78" y="168" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7aa2f7">Condition</text>
  <text x="78" y="220" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7aa2f7">Temperature</text>
