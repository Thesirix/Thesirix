name: "🔐 TryHackMe Badge"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  update-thm-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install playwright && playwright install chromium --with-deps

      - name: Generate THM badge
        run: |
          python3 << 'EOF'
          import os
          from playwright.sync_api import sync_playwright

          USER_PUBLIC_ID = "69de1facc23d0ac598079f59"
          BADGE_URL = f"https://tryhackme.com/api/v2/badges/public-profile?userPublicId={USER_PUBLIC_ID}"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
              )

              # Visit homepage first to get cookies
              page = context.new_page()
              page.goto("https://tryhackme.com", wait_until="domcontentloaded")
              page.wait_for_timeout(1000)

              # THM returns an HTML badge card (not JSON) for real browser requests
              page.set_viewport_size({"width": 400, "height": 160})
              page.goto(BADGE_URL, wait_until="networkidle")
              page.wait_for_timeout(4000)  # wait for Font Awesome + Google Fonts

              os.makedirs("assets", exist_ok=True)
              page.screenshot(path="assets/thm_propic.png", full_page=True)
              browser.close()

          print("Badge generated successfully!")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/thm_propic.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔐 Update TryHackMe badge"
            git pull --rebase origin main
            git push origin main
          fi
