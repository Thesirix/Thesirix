name: "🔐 TryHackMe Badge"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  update-thm-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install playwright && playwright install chromium --with-deps

      - name: Generate THM badge
        run: |
          python3 << 'EOF'
          import os, json
          from playwright.sync_api import sync_playwright

          USER_PUBLIC_ID = "69de1facc23d0ac598079f59"
          API_URL = f"https://tryhackme.com/api/v2/badges/public-profile?userPublicId={USER_PUBLIC_ID}"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                  extra_http_headers={
                      "Accept": "application/json, text/plain, */*",
                      "Accept-Language": "en-US,en;q=0.9",
                      "Referer": "https://tryhackme.com/",
                  }
              )

              # Visit homepage first to get cookies
              page = context.new_page()
              page.goto("https://tryhackme.com", wait_until="domcontentloaded")
              page.wait_for_timeout(2000)

              # Now fetch the API
              response = page.goto(API_URL, wait_until="load")
              print(f"[DEBUG] Status: {response.status}")
              print(f"[DEBUG] Final URL: {page.url}")
              body = response.text()
              print(f"[DEBUG] Body length: {len(body)}")
              print(f"[DEBUG] Body preview: {body[:300]}")

              data = json.loads(body)["data"]

              username = data["username"]
              points   = data["totalPoints"]
              rank     = data["rank"]
              badges   = data["badgesNumber"]
              rooms    = data["completedRoomsNumber"]
              avatar   = data["avatar"]
              league   = data.get("leagueTier", "").capitalize()

              print(f"[OK] User: {username} | {points} pts | {rank}")

              html = f"""<!DOCTYPE html>
          <html><head><style>
            * {{ margin:0; padding:0; box-sizing:border-box; }}
            body {{ background:transparent; font-family:'Segoe UI',sans-serif; }}
            .card {{
              width:329px; height:88px;
              background:#1a1a2e;
              border-radius:10px;
              display:flex; align-items:center;
              padding:10px; gap:12px;
              border:1px solid #2d2d44;
            }}
            .avatar {{ width:60px; height:60px; border-radius:50%; object-fit:cover; }}
            .info {{ flex:1; color:white; }}
            .username {{ font-size:15px; font-weight:bold; color:#88cc88; }}
            .rank     {{ font-size:11px; color:#60a0ff; margin-top:3px; }}
            .stats    {{ font-size:11px; color:#aaaaaa; margin-top:3px; }}
            .logo     {{ font-size:11px; color:#88cc00; font-weight:bold; margin-top:3px; }}
          </style></head><body>
          <div class="card">
            <img class="avatar" src="{avatar}" />
            <div class="info">
              <div class="username">{username}</div>
              <div class="rank">{rank} · {league} League</div>
              <div class="stats">{points} pts · {badges} badges · {rooms} rooms</div>
              <div class="logo">TryHackMe</div>
            </div>
          </div>
          </body></html>"""

              badge_page = context.new_page()
              badge_page.set_viewport_size({"width": 329, "height": 88})
              badge_page.set_content(html)
              badge_page.wait_for_load_state("networkidle")
              badge_page.wait_for_timeout(2000)

              os.makedirs("assets", exist_ok=True)
              badge_page.screenshot(
                  path="assets/thm_propic.png",
                  clip={"x": 0, "y": 0, "width": 329, "height": 88}
              )
              browser.close()

          print("Badge generated successfully!")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/thm_propic.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔐 Update TryHackMe badge"
            git pull --rebase origin main
            git push origin main
          fi
