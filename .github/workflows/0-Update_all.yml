name: "00 🚀 Update All"

on:
  workflow_dispatch:

jobs:

  # ── 1. Recent Activity ───────────────────────────────────────────────────────
  activity:
    name: "⚡ Recent Activity"
    continue-on-error: true
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/activity.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "⚡ Update recent activity"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 3. Weather Forecast ──────────────────────────────────────────────────────
  weather:
    name: "🌤️ Weather Forecast"
    needs: [activity]
    continue-on-error: true
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update weather
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python3 scripts/weather.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md assets/weather.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🌤️ Update weather forecast"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 4. Snake SVG ─────────────────────────────────────────────────────────────
  snake:
    name: "🐍 Generate Snake"
    needs: [weather]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate snake SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/snake.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/snake.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🐍 Update snake"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 5. Pac-Man ───────────────────────────────────────────────────────────────
  pacman:
    name: "👾 Pac-Man"
    needs: [snake]
    continue-on-error: true
    permissions: write-all
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate Pac-Man SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Copy SVG to assets
        run: |
          cp dist/pacman-contribution-graph.svg assets/pacman.svg

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/pacman.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "👾 Update Pac-Man"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 6. Contrib Card ──────────────────────────────────────────────────────────
  contrib-card:
    name: "🃏 Contrib Card"
    needs: [pacman]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch contrib card code
        run: |
          git fetch origin contribution_card
          mkdir -p contrib-card
          for f in fetchStats.js renderCard.js generate.js package.json package-lock.json; do
            git show origin/contribution_card:contrib-card/$f > contrib-card/$f
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install
        working-directory: contrib-card

      - name: Generate SVG
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          LIMIT: '10'
        run: node generate.js
        working-directory: contrib-card

      - name: Move SVG to assets
        run: cp contrib-card/contrib-card.svg assets/contrib-card.svg

      - name: Commit & push to main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/contrib-card.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🃏 Update contrib card"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 7. Top Repositories ──────────────────────────────────────────────────────
  top-repos:
    name: "⭐ Top Repositories"
    needs: [contrib-card]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build top repos table SVGs
        run: |
          python3 << 'EOF'
          import json, urllib.request, os, re

          USERNAME = os.environ.get("GITHUB_REPOSITORY_OWNER", "Thesirix")
          TOKEN    = os.environ.get("GITHUB_TOKEN", "")

          api_url = f"https://api.github.com/users/{USERNAME}/repos?per_page=100"
          hdrs = {"User-Agent": "top-repos-readme-py", "Accept": "application/vnd.github+json"}
          if TOKEN:
              hdrs["Authorization"] = f"Bearer {TOKEN}"
          with urllib.request.urlopen(urllib.request.Request(api_url, headers=hdrs), timeout=30) as r:
              repos = json.loads(r.read())

          top = sorted(repos, key=lambda r: r.get("stargazers_count", 0), reverse=True)[:3]

          # Tokyo Night palette (same as weather.svg)
          C_BG  = "#1a1b2e"; C_HDR = "#13131f"; C_NAME = "#7aa2f7"
          C_DESC= "#a9b1d6"; C_DATA= "#38bdae"; C_LANG = "#bb9af7"; C_SEP = "#292e42"
          F  = "Segoe UI, Arial, sans-serif"
          FE = "Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji, Segoe UI, Arial, sans-serif"

          # Column layout (total card width 784px)
          W=820; PAD=8; CW=784
          SEP1=PAD+440; SEP2=SEP1+108; SEP3=SEP2+108
          HC1=(PAD+SEP1)//2; HC2=(SEP1+SEP2)//2; HC3=(SEP2+SEP3)//2; HC4=(SEP3+PAD+CW)//2

          def xe(s): return str(s).replace("&","&amp;").replace("<","&lt;").replace(">","&gt;")

          def mk_defs(ch):
              return (
                  f'  <defs>\n'
                  f'    <filter id="sh" x="0%" y="0%" width="114%" height="112%">\n'
                  f'      <feGaussianBlur in="SourceAlpha" stdDeviation="9" result="blur"/>\n'
                  f'      <feOffset in="blur" dx="5" dy="3" result="shifted"/>\n'
                  f'      <feFlood flood-color="#000000" flood-opacity="0.35" result="color"/>\n'
                  f'      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>\n'
                  f'      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>\n'
                  f'    </filter>\n'
                  f'    <clipPath id="clip"><rect x="{PAD}" y="{PAD}" width="{CW}" height="{ch}" rx="14" ry="14"/></clipPath>\n'
                  f'  </defs>\n'
              )

          def mk_seps(ch):
              return "".join(
                  f'  <line x1="{x}" y1="{PAD}" x2="{x}" y2="{PAD+ch}" stroke="{C_SEP}" stroke-width="1"/>\n'
                  for x in (SEP1, SEP2, SEP3)
              )

          def make_header():
              CH=44; H=PAD*2+CH+8; cy=PAD+CH//2
              return (
                  f'<svg xmlns="http://www.w3.org/2000/svg" width="{W}" height="{H}">\n'
                  + mk_defs(CH)
                  + f'  <rect x="{PAD}" y="{PAD}" width="{CW}" height="{CH}" rx="14" ry="14" fill="{C_HDR}" filter="url(#sh)"/>\n'
                  + mk_seps(CH)
                  + f'  <text x="{HC1}" y="{cy}" text-anchor="middle" dominant-baseline="central" font-family="{FE}" font-size="13" font-weight="600" fill="{C_NAME}">📦  Repository</text>\n'
                  + f'  <text x="{HC2}" y="{cy}" text-anchor="middle" dominant-baseline="central" font-family="{FE}" font-size="13" font-weight="600" fill="{C_NAME}">⭐  Stars</text>\n'
                  + f'  <text x="{HC3}" y="{cy}" text-anchor="middle" dominant-baseline="central" font-family="{FE}" font-size="13" font-weight="600" fill="{C_NAME}">🍴  Forks</text>\n'
                  + f'  <text x="{HC4}" y="{cy}" text-anchor="middle" dominant-baseline="central" font-family="{FE}" font-size="13" font-weight="600" fill="{C_NAME}">🗣️  Language</text>\n'
                  + '</svg>'
              )

          def make_row(name, desc, stars, forks, lang):
              CH=82; H=PAD*2+CH+8; cy=PAD+CH//2
              nt=xe(name[:45]); dt=xe((desc or "No description")[:78]); lt=xe(lang) if lang else ""
              if lt:
                  bw=len(lt)*7+18; bx=HC4-bw//2; by=cy-13
                  lang_el=(
                      f'  <rect x="{bx}" y="{by}" width="{bw}" height="26" rx="6" fill="{C_SEP}"/>\n'
                      f'  <text x="{HC4}" y="{cy}" text-anchor="middle" dominant-baseline="central" font-family="{F}" font-size="13" fill="{C_LANG}">{lt}</text>\n'
                  )
              else:
                  lang_el=f'  <text x="{HC4}" y="{cy}" text-anchor="middle" dominant-baseline="central" font-family="{F}" font-size="14" fill="{C_DESC}">—</text>\n'
              return (
                  f'<svg xmlns="http://www.w3.org/2000/svg" width="{W}" height="{H}">\n'
                  + mk_defs(CH)
                  + f'  <rect x="{PAD}" y="{PAD}" width="{CW}" height="{CH}" rx="14" ry="14" fill="{C_BG}" filter="url(#sh)"/>\n'
                  + f'  <rect x="{PAD}" y="{PAD}" width="6" height="{CH}" fill="{C_NAME}" clip-path="url(#clip)"/>\n'
                  + mk_seps(CH)
                  + f'  <text x="{PAD+28}" y="{PAD+30}" font-family="{F}" font-size="14" font-weight="700" fill="{C_NAME}">{nt}</text>\n'
                  + f'  <text x="{PAD+28}" y="{PAD+54}" font-family="{F}" font-size="11" fill="{C_DESC}">{dt}</text>\n'
                  + f'  <text x="{HC2}" y="{cy}" text-anchor="middle" dominant-baseline="central" font-family="{FE}" font-size="18" fill="{C_DATA}">⭐ {stars}</text>\n'
                  + f'  <text x="{HC3}" y="{cy}" text-anchor="middle" dominant-baseline="central" font-family="{FE}" font-size="18" fill="{C_DATA}">🍴 {forks}</text>\n'
                  + lang_el
                  + '</svg>'
              )

          os.makedirs("assets", exist_ok=True)
          with open("assets/top-repo-header.svg", "w", encoding="utf-8") as f:
              f.write(make_header())

          repo_links = []
          for i, r in enumerate(top, 1):
              name=r.get("name",""); url_=r.get("html_url","")
              desc=r.get("description") or ""; stars=r.get("stargazers_count",0)
              forks=r.get("forks_count",0); lang=r.get("language")
              path=f"assets/top-repo-{i}.svg"
              with open(path, "w", encoding="utf-8") as f:
                  f.write(make_row(name, desc, stars, forks, lang))
              repo_links.append(f'[![{xe(name)}]({path})]({url_})')

          imgs = "![](assets/top-repo-header.svg)\n" + "\n".join(repo_links)
          new_section = f'\n<div align="center">\n\n{imgs}\n\n</div>\n'
          START="<!--TOP_REPOS_START-->"; END="<!--TOP_REPOS_END-->"
          with open("README.md", encoding="utf-8") as f: readme=f.read()
          updated=re.sub(re.escape(START)+r".*?"+re.escape(END), START+new_section+END, readme, flags=re.DOTALL)
          with open("README.md", "w", encoding="utf-8") as f: f.write(updated)
          print("Top repos table SVGs generated ✓")
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md assets/top-repo-header.svg assets/top-repo-*.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "⭐ Update top repositories"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 8. Trophy ────────────────────────────────────────────────────────────────
  trophy:
    name: "🏆 Trophy"
    needs: [top-repos]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch trophy source
        run: |
          git fetch origin trophy
          mkdir -p trophy-src/src
          for f in $(git ls-tree -r --name-only origin/trophy); do
            mkdir -p trophy-src/$(dirname $f)
            git show origin/trophy:$f > trophy-src/$f
          done

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate Trophy SVG
        env:
          GITHUB_TOKEN1: ${{ secrets.GH_TOKEN }}
        run: |
          cd trophy-src
          deno run --allow-net --allow-env --allow-read --allow-write \
            render_svg.ts Thesirix ../assets/trophy.svg tokyonight

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/trophy.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🏆 Update trophy"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 9. 3D City ───────────────────────────────────────────────────────────────
  city3d:
    name: "🏙️ 3D City"
    needs: [trophy]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch city-3d action source
        run: |
          git fetch origin city-3d
          mkdir -p .city-3d-action/dist
          git show origin/city-3d:action.yml > .city-3d-action/action.yml
          git show origin/city-3d:dist/index.js > .city-3d-action/dist/index.js
          git show origin/city-3d:dist/xhr-sync-worker.js > .city-3d-action/dist/xhr-sync-worker.js

      - name: Generate 3D contribution city
        uses: ./.city-3d-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Push SVGs to branch city-3d
        run: |
          mkdir /tmp/city-push && cd /tmp/city-push
          git init
          git fetch "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" city-3d
          git checkout FETCH_HEAD
          git checkout -b city-3d
          cp -r $GITHUB_WORKSPACE/profile-3d-contrib/* profile-3d-contrib/
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add profile-3d-contrib/
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🏙️ Update 3D city"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" city-3d
          fi

  # ── 10. GitHub Metrics ───────────────────────────────────────────────────────
  metrics:
    name: "📊 GitHub Metrics"
    needs: [city3d]
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: lowlighter/metrics@latest
        with:
          user: Thesirix
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/github-metrics.svg
          output_action: none

          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Paris

          plugin_introduction: yes

          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors
          plugin_wakatime_limit: 5

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_other: yes
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5

          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_licenses: yes
          plugin_licenses_setup: npm ci

          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons

          plugin_activity: yes
          plugin_activity_days: 90
          plugin_activity_filter: all
          plugin_activity_limit: 1
          plugin_activity_load: 300
          plugin_activity_visibility: all

          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit

          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following

          plugin_repositories: yes
          plugin_repositories_order: featured, pinned, starred, random

          plugin_stars: yes
          plugin_stars_limit: 2

          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes

          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_days: 14
          plugin_reactions_display: absolute

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

          plugin_calendar: yes
          plugin_calendar_limit: 1

          plugin_code: yes
          plugin_code_lines: 12
          plugin_code_load: 400
          plugin_code_days: 3
          plugin_code_visibility: public

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/github-metrics.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "📊 Update metrics"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 11. Timestamps ────────────────────────────────────────────────────────────
  timestamps:
    name: "🕐 Timestamps"
    needs: [metrics]
    uses: ./.github/workflows/Timestamps.yml

  # ── 12. Rebuild README from template ─────────────────────────────────────────
  rebuild:
    name: "📋 Rebuild from template"
    needs: [timestamps]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Rebuild README from template
        run: python3 scripts/build_readme.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "📋 Rebuild from template"
            git pull --rebase origin main
            git push origin main
          fi
