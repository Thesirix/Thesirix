name: "00 🚀 Update All"

on:
  workflow_dispatch:

jobs:

  # ── 1. Rebuild README from template ────────────────────────────────────────
  rebuild:
    name: "📋 Rebuild from template"
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild README from template
        run: python3 scripts/build_readme.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "📋 Rebuild from template"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 2. Recent Activity ───────────────────────────────────────────────────────
  activity:
    name: "⚡ Recent Activity"
    needs: [rebuild]
    continue-on-error: true
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/activity.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "⚡ Update recent activity"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 3. Weather Forecast ──────────────────────────────────────────────────────
  weather:
    name: "🌤️ Weather Forecast"
    needs: [activity]
    continue-on-error: true
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update weather
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python3 scripts/weather.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md assets/weather.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🌤️ Update weather forecast"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 4. Snake SVG ─────────────────────────────────────────────────────────────
  snake:
    name: "🐍 Generate Snake"
    needs: [weather]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate snake SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/snake.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/snake.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🐍 Update snake"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 5. Contrib Card (independent, pushes to widget branch) ─────────────────
  contrib-card:
    name: "🃏 Contrib Card"
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch widget code (sans stager)
        run: |
          git fetch origin widget
          mkdir -p contrib-card
          for f in fetchStats.js renderCard.js generate.js package.json package-lock.json; do
            git show origin/widget:contrib-card/$f > contrib-card/$f
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install
        working-directory: contrib-card

      - name: Generate SVG
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          LIMIT: '10'
        run: node generate.js
        working-directory: contrib-card

      - name: Move SVG to assets
        run: cp contrib-card/contrib-card.svg assets/contrib-card.svg

      - name: Commit & push to main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/contrib-card.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🃏 Update contrib card"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 6. Top Repositories (independent) ──────────────────────────────────────
  top-repos:
    name: "⭐ Top Repositories"
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build top repos section
        run: |
          python3 << 'EOF'
          import json, urllib.request, os, re

          USERNAME = os.environ.get("GITHUB_REPOSITORY_OWNER", "Thesirix")
          TOKEN    = os.environ.get("GITHUB_TOKEN", "")

          url = f"https://api.github.com/users/{USERNAME}/repos?per_page=100"
          headers = {"User-Agent": "top-repos-readme-py", "Accept": "application/vnd.github+json"}
          if TOKEN:
              headers["Authorization"] = f"Bearer {TOKEN}"

          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req, timeout=30) as r:
              repos = json.loads(r.read())

          top = sorted(repos, key=lambda r: r.get("stargazers_count", 0), reverse=True)[:3]

          # Tokyo Night palette (same as weather.svg)
          C_BG   = "1a1b2e"
          C_STAR = "7aa2f7"
          C_FORK = "bb9af7"
          C_LANG = "38bdae"

          def sh_esc(s):
              return s.replace("-", "--").replace("_", "__").replace(" ", "_")

          lines = [
              '<div align="center">',
              "",
              "| 📦 Repository | ⭐ Stars | 🍴 Forks | 🗣️ Language |",
              "|:---|:---:|:---:|:---:|",
          ]
          for r in top:
              name  = r.get("name", "")
              url_  = r.get("html_url", "")
              owner = r.get("owner", {}).get("login", USERNAME)
              lang  = r.get("language")
              desc  = (r.get("description") or "_No description_")[:60]

              star_b = f"[![stars](https://img.shields.io/github/stars/{owner}/{name}?style=flat&color={C_STAR}&labelColor={C_BG})]({url_}/stargazers)"
              fork_b = f"[![forks](https://img.shields.io/github/forks/{owner}/{name}?style=flat&color={C_FORK}&labelColor={C_BG})]({url_}/network/members)"
              lang_b = f"![{lang}](https://img.shields.io/badge/{sh_esc(lang)}-{C_LANG}?style=flat&labelColor={C_BG})" if lang else "—"

              lines.append(f'| [**{name}**]({url_}) <br/> <sub>{desc}</sub> | {star_b} | {fork_b} | {lang_b} |')
          lines += ["", "</div>", ""]

          START = "<!--TOP_REPOS_START-->"
          END   = "<!--TOP_REPOS_END-->"
          new_content = "\n" + "\n".join(lines) + "\n"

          with open("README.md", encoding="utf-8") as f:
              readme = f.read()

          updated = re.sub(
              re.escape(START) + r".*?" + re.escape(END),
              START + new_content + END,
              readme,
              flags=re.DOTALL,
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated)
          print("Top repos updated ✓")
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "⭐ Update top repositories"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 7. 3D City (independent, pushes to city-3d branch) ──────────────────────
  city3d:
    name: "🏙️ 3D City"
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution city
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Push to branch city-3d
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: city-3d
          publish_dir: ./profile-3d-contrib
          destination_dir: profile-3d-contrib
          commit_message: "🏙️ Update 3D city"
