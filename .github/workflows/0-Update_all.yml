name: "00 🚀 Update All"

on:
  workflow_dispatch:

jobs:

  # ── 1. Rebuild README from template ────────────────────────────────────────
  rebuild:
    name: "📋 Rebuild from template"
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild README from template
        run: python3 scripts/build_readme.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "📋 Rebuild from template"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 2. Recent Activity ───────────────────────────────────────────────────────
  activity:
    name: "⚡ Recent Activity"
    needs: [rebuild]
    continue-on-error: true
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/activity.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "⚡ Update recent activity"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 3. Weather Forecast ──────────────────────────────────────────────────────
  weather:
    name: "🌤️ Weather Forecast"
    needs: [activity]
    continue-on-error: true
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update weather
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python3 scripts/weather.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md assets/weather.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🌤️ Update weather forecast"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 4. Snake SVG ─────────────────────────────────────────────────────────────
  snake:
    name: "🐍 Generate Snake"
    needs: [weather]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate snake SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/snake.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/snake.svg
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🐍 Update snake"
            git pull --rebase origin main
            git push origin main
          fi

  # ── 5. 3D City (independent, pushes to city-3d branch) ──────────────────────
  city3d:
    name: "🏙️ 3D City"
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution city
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Push to branch city-3d
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: city-3d
          publish_dir: ./profile-3d-contrib
          destination_dir: profile-3d-contrib
          commit_message: "🏙️ Update 3D city"
