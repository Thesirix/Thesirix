name: "🌤️ Weather Forecast"

on:
  schedule:
    - cron: "27 * * * *"
  workflow_dispatch:
  workflow_call:

jobs:
  update-weather:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch weather & update README
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, urllib.request, json, re
          from datetime import datetime

          api_key = os.environ["WEATHER_API_KEY"]
          url = (
              "https://api.weatherapi.com/v1/forecast.json"
              f"?key={api_key}&q=Marseille&days=3&aqi=no&alerts=no"
          )

          with urllib.request.urlopen(url) as r:
              data = json.loads(r.read())

          days = data["forecast"]["forecastday"]

          def fmt_date(d):
              return datetime.strptime(d, "%Y-%m-%d").strftime("%d/%m/%Y")

          dates = "".join(f"<td>{fmt_date(d['date'])}</td>" for d in days)
          icons = "".join(
              f'<td><img src="https:{d["day"]["condition"]["icon"]}"/></td>'
              for d in days
          )
          conds = "".join(
              f'<td width="200px">{d["day"]["condition"]["text"]}</td>'
              for d in days
          )
          temps = "".join(
              f'<td>{d["day"]["mintemp_c"]} -  {d["day"]["maxtemp_c"]} °C</td>'
              for d in days
          )
          winds = "".join(f'<td>{d["day"]["maxwind_kph"]} kph</td>' for d in days)

          table = f"""<table>
              <tr>
                  <th>Date</th>
                  {dates}
              </tr>
              <tr>
                  <th>Weather</th>
                  {icons}
              </tr>
              <tr>
                  <th>Condition</th>
                  {conds}
              </tr>
              <tr>
                  <th>Temperature</th>
                  {temps}
              </tr>
              <tr>
                  <th>Wind</th>
                  {winds}
              </tr>
          </table>"""

          with open("README.md") as f:
              content = f.read()

          updated = re.sub(
              r"<!-- WEATHER_START -->.*?<!-- WEATHER_END -->",
              f"<!-- WEATHER_START -->\n\n{table}\n\n<!-- WEATHER_END -->",
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(updated)

          print("Weather updated ✓")
          PYEOF

      - name: Commit & push
        run: |
          if git diff --exit-code; then
            echo "No changes to commit."
            exit 0
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add README.md
            git commit -m "🌤️ Update weather forecast"
            git pull --rebase origin main
            git push origin main
          fi
