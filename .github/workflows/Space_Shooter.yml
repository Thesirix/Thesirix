name: "🛸 Space Shooter Game"

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  generate:
    permissions: write-all
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install gh-space-shooter CLI
        run: pip install gh-space-shooter

      - name: Generate Space Shooter GIF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh-space-shooter ${{ github.repository_owner }} --output assets/space-shooter.gif --strategy random

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/space-shooter.gif
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🛸 Update space shooter"
            git pull --rebase --autostash origin main
            git push origin main
          fi
