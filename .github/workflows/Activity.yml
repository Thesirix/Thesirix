name: "⚡ Recent Activity"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  workflow_call:

jobs:
  update-activity:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
