name: "🧮 Equation of the Day"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  workflow_call:

jobs:
  equation:
    name: "🧮 Equation of the Day"
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          repository: Thesirix/equation-of-the-day
          path: _equation_src

      - name: Inject daily equation
        run: |
          python3 << 'EOF'
          import json, random

          with open('_equation_src/equations.json', 'r', encoding='utf-8') as f:
              equations = json.load(f)

          eq = random.choice(equations)

          block = f"""$$
\\large {eq['latex']}
$$

{eq['author']} - **{eq['name']}** ({eq['year']})

> [!NOTE]
> {eq['description']} [Read more]({eq['url']})
"""

          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(readme.replace('{{DAILY_EQUATION}}', block))
          EOF

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          if git diff --cached --exit-code; then
            echo "No changes."
          else
            git commit -m "🧮 Update equation of the day"
            git pull --rebase origin main
            git push origin main
          fi
